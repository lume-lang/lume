[package]
name = "grammar"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
default-run = "grammar-codegen"

[lib]
test = false
doctest = false

[[bin]]
name = "grammar-codegen"
test = false

[dependencies]
lume_span = { path = "../../crates/lume_span" }

prettyplease = { version = "0.2" }
proc-macro2 = { version = "1.0" }
quote = { version = "1.0.45" }
syn = { version = "2.0", features = ["full"] }
ungrammar = { version = "1.16.1" }

[lints]
workspace = true
